{% extends 'layout.html' %}
    {% block title %}
        Posts
    {% endblock %}
    {% block content %}
    <div id="posts" style="display: flex; flex-direction: column; gap: 10px;">
        <div>
            <h2>Posts</h2>
            <a href="/posts/add">Add Post</a>
        </div>
        {% if posts.count == 0 %}
            <p><em>No posts yet</em></p>
        {% endif %}
        {% for post in posts %}
            <div class="post-card hover-block">
                
                <a href="{% url 'post_page' post.id %}">
                    <h3>{{ post.title }}</h3>
                    <p style="font-size: 0.8em; opacity: 0.5; margin-bottom: 5px;">{{ post.created_by }}</p>
                    <p><em>{{ post.subject }}</em></p>
                    <p class="description">{{ post.description }}</p>
                </a>
            </div>
        {% endfor %}
    </div>
    {% endblock %}
