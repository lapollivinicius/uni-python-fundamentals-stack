{% extends 'layout.html' %}
    {% block title %}
        Posts
    {% endblock %}
    {% block content %}
    <div>
        <h2>Posts</h2>
        {% for post in posts %}
            <div class='post-card'>
                <h3>{{ post.title }}</h3>
                <p>{{ post.created_at }}</p>
                <p>{{ post.description }}</p>
            </div>
        {% endfor %}
    </div>
    {% endblock %}
